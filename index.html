let currentMatiere = null;
let currentChapter = null;
let currentQuizData = null;
let quizState = {};
let progress = {};

function loadProgress() {
  try {
    const s = localStorage.getItem('brevet2026_progress');
    if (s) progress = JSON.parse(s);
  } catch(e) { progress = {}; }
}
function saveProgress() {
  try { localStorage.setItem('brevet2026_progress', JSON.stringify(progress)); } catch(e) {}
}
function confirmReset() {
  if (confirm('Réinitialiser toute la progression ?')) {
    progress = {};
    saveProgress();
    renderDashboard();
  }
}
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const nb = document.getElementById('nav-' + (id === 'quiz-select' ? 'quiz' : id));
  if (nb) nb.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'fiches') renderFicheNav();
  if (id === 'quiz-select') renderQuizNav();
}
function totalQuestions() {
  let t = 0;
  Object.values(DATA).forEach(m => m.chapters.forEach(c => t += (c.quiz||[]).length));
  return t;
}
function totalAnswered() {
  let t = 0;
  Object.values(progress).forEach(v => t += (v.answered||0));
  return t;
}
function totalCorrect() {
  let t = 0;
  Object.values(progress).forEach(v => t += (v.correct||0));
  return t;
}
function chaptersCompleted() {
  let t = 0;
  Object.values(DATA).forEach(m => m.chapters.forEach(c => {
    const p = progress[c.id];
    if (p && p.answered > 0 && p.answered >= (c.quiz||[]).length) t++;
  }));
  return t;
}
function renderDashboard() {
  const ta = totalAnswered(), tc = totalCorrect(), tq = totalQuestions();
  const pct = ta > 0 ? Math.round(tc/ta*100) : 0;
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Questions répondues</div><div class="stat-value">${ta}</div><div class="stat-sub">sur ${tq} au total</div></div>
    <div class="stat-card"><div class="stat-label">Bonnes réponses</div><div class="stat-value">${tc}</div><div class="stat-sub">${pct}% de réussite</div></div>
    <div class="stat-card"><div class="stat-label">Chapitres tentés</div><div class="stat-value">${chaptersCompleted()}</div><div class="stat-sub">complétés</div></div>
  `;
  let html = '';
  Object.entries(DATA).forEach(([mid, m]) => {
    html += `<div class="matiere-group-label">${m.label}</div>`;
    m.chapters.forEach(c => {
      const p = progress[c.id] || {};
      const ans = p.answered || 0;
      const cor = p.correct || 0;
      const tot = (c.quiz||[]).length;
      const pct2 = tot > 0 ? Math.round(ans/tot*100) : 0;
      const label = ans > 0 ? `${cor}/${ans} (${Math.round(cor/ans*100)}%)` : 'Non commencé';
      html += `<div class="ch-progress"><div class="ch-progress-name">${c.title}</div><div class="ch-progress-bar"><div class="ch-progress-fill" style="width:${pct2}%"></div></div><div class="ch-progress-score">${label}</div></div>`;
    });
  });
  document.getElementById('dash-progress').innerHTML = html;
}
function renderFicheNav() {
  if (!currentMatiere) currentMatiere = Object.keys(DATA)[0];
  const tabs = document.getElementById('matiere-tabs');
  tabs.innerHTML = Object.entries(DATA).map(([mid, m]) =>
    `<button class="matiere-tab ${mid===currentMatiere?'active':''}" onclick="selectMatiere('${mid}')">${m.label}</button>`
  ).join('');
  renderChapterList();
}
function selectMatiere(mid) {
  currentMatiere = mid;
  currentChapter = null;
  renderFicheNav();
  document.getElementById('fiche-display').innerHTML = '';
}
function renderChapterList() {
  const m = DATA[currentMatiere];
  document.getElementById('chapter-list').innerHTML = m.chapters.map(c =>
    `<button class="ch-btn ${c.id===currentChapter?'active':''}" onclick="showFiche('${c.id}')">${c.title}</button>`
  ).join('');
  if (currentChapter) {
    const c = m.chapters.find(x => x.id === currentChapter);
    if (c) renderFiche(c);
  }
}
function showFiche(cid) {
  currentChapter = cid;
  for (const [mid, m] of Object.entries(DATA)) {
    const c = m.chapters.find(x => x.id === cid);
    if (c) { currentMatiere = mid; renderFicheNav(); renderFiche(c); return; }
  }
}
function renderFiche(c) {
  const datesHtml = (c.dates||[]).map(d => `<div class="date-card"><div class="date-year">${d.year}</div><div class="date-desc">${d.desc}</div></div>`).join('');
  const peopleHtml = (c.people||[]).map(p => `<div class="person-card"><div class="person-name">${p.name}</div><div class="person-role">${p.role||''}</div></div>`).join('');
  const notionsHtml = (c.notions||[]).map(n => `<span class="notion">${n}</span>`).join('');
  document.getElementById('fiche-display').innerHTML = `
    <div class="fiche-card">
      <div class="fiche-title">${c.title}</div>
      <div class="fiche-hint">📖 Lis, puis cache et récite !</div>
      ${c.dates&&c.dates.length ? `<div class="section-label">📅 Dates / Étapes clés</div><div class="dates-grid">${datesHtml}</div>` : ''}
      ${c.people&&c.people.length ? `<div class="section-label">👤 Personnages / Notions</div><div class="people-grid">${peopleHtml}</div>` : ''}
      ${c.causes ? `<div class="section-label">📌 Contexte / Causes</div><div class="summary-block"><div class="summary-text">${c.causes}</div></div>` : ''}
      ${c.deroulement ? `<div class="section-label">⚙️ Déroulement / Contenu</div><div class="summary-block"><div class="summary-text">${c.deroulement}</div></div>` : ''}
      ${c.fin ? `<div class="section-label">✅ À retenir / Fin</div><div class="summary-block"><div class="summary-text">${c.fin}</div></div>` : ''}
      ${notionsHtml ? `<div class="section-label">🔑 Notions-clés</div><div class="notions">${notionsHtml}</div>` : ''}
      ${(c.quiz||[]).length > 0 ? `<button class="btn-quiz" onclick="startQuizFromFiche('${c.id}')">🎯 Faire le quiz de ce chapitre</button>` : ''}
    </div>`;
}
function renderQuizNav() {
  if (!currentMatiere) currentMatiere = Object.keys(DATA)[0];
  const tabs = document.getElementById('quiz-matiere-tabs');
  tabs.innerHTML = Object.entries(DATA).map(([mid, m]) =>
    `<button class="matiere-tab ${mid===currentMatiere?'active':''}" onclick="selectQMatiere('${mid}')">${m.label}</button>`
  ).join('');
  const m = DATA[currentMatiere];
  document.getElementById('quiz-chapter-list').innerHTML = m.chapters.filter(c=>(c.quiz||[]).length>0).map(c =>
    `<button class="ch-btn" onclick="startQuiz('${c.id}')">${c.title}</button>`
  ).join('');
}
function selectQMatiere(mid) {
  currentMatiere = mid;
  document.getElementById('quiz-area').innerHTML = '';
  renderQuizNav();
}
function startQuizFromFiche(cid) {
  showPage('quiz-select');
  setTimeout(() => startQuiz(cid), 50);
}
function startQuiz(cid) {
  let chapter = null;
  for (const m of Object.values(DATA)) {
    chapter = m.chapters.find(c => c.id === cid);
    if (chapter) break;
  }
  if (!chapter || !(chapter.quiz||[]).length) return;
  currentQuizData = { chapter, questions: shuffle([...chapter.quiz]), current: 0, correct: 0, answers: [] };
  renderQuestion();
}
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function renderQuestion() {
  const d = currentQuizData;
  const q = d.questions[d.current];
  const total = d.questions.length;
  const shuffledOpts = q.options.map((o,i)=>({text:o,orig:i}));
  shuffle(shuffledOpts);
  const correctNewIdx = shuffledOpts.findIndex(o=>o.orig===q.answer);
  const pct = Math.round(d.current/total*100);
  document.getElementById('quiz-area').innerHTML = `
    <div class="quiz-header">
      <h2>${d.chapter.title}</h2>
      <div class="quiz-meta">Question ${d.current+1} / ${total}</div>
    </div>
    <div class="quiz-body">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${shuffledOpts.map((o,i)=>`<button class="option" id="opt${i}" onclick="selectAnswer(${i},${correctNewIdx},${d.current})">${o.text}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">${d.current+1<total?'Question suivante →':'Voir les résultats'}</button>
    </div>`;
}
function selectAnswer(chosen, correct, qIdx) {
  document.querySelectorAll('.option').forEach(b => { b.classList.add('disabled'); b.onclick=null; });
  const isCorrect = chosen === correct;
  document.getElementById('opt'+correct).classList.add('correct');
  if (!isCorrect) document.getElementById('opt'+chosen).classList.add('wrong');
  const expl = currentQuizData.questions[qIdx].explication;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect?'correct':'wrong');
  fb.innerHTML = (isCorrect?'✅ Bonne réponse ! ':'❌ Mauvaise réponse. ') + expl;
  document.getElementById('btn-next').classList.add('show');
  if (isCorrect) currentQuizData.correct++;
  currentQuizData.answers.push({ok:isCorrect, q:currentQuizData.questions[qIdx].q});
}
function nextQuestion() {
  currentQuizData.current++;
  if (currentQuizData.current >= currentQuizData.questions.length) showResult();
  else renderQuestion();
}
function showResult() {
  const d = currentQuizData;
  const c = d.correct, t = d.questions.length;
  const pct = Math.round(c/t*100);
  const cid = d.chapter.id;
  if (!progress[cid]) progress[cid] = {answered:0,correct:0};
  progress[cid].answered = (progress[cid].answered||0) + t;
  progress[cid].correct = (progress[cid].correct||0) + c;
  saveProgress();
  let msg, emoji;
  if (pct >= 80) { msg="Excellent ! Tu maîtrises bien ce chapitre !"; emoji="🏆"; }
  else if (pct >= 60) { msg="Bien joué ! Relis les points ratés."; emoji="👍"; }
  else { msg="Courage ! Relis la fiche et recommence."; emoji="📖"; }
  const reviewHtml = d.answers.map((a,i) =>
    `<div class="answer-item ${a.ok?'ok':'ko'}"><div class="answer-q">${a.ok?'✅':'❌'} Q${i+1} : ${a.q}</div></div>`
  ).join('');
  document.getElementById('quiz-area').innerHTML = `
    <div class="result-card">
      <div class="result-score">${emoji} ${c}/${t}</div>
      <div class="result-label">${pct}% de réussite</div>
      <div class="result-msg">${msg}</div>
      <div class="result-actions">
        <button class="btn-primary" onclick="startQuiz('${cid}')">🔄 Refaire</button>
        <button class="btn-secondary" onclick="showFicheFromResult('${cid}')">📖 Revoir la fiche</button>
      </div>
      <div class="answers-review">${reviewHtml}</div>
    </div>`;
}
function showFicheFromResult(cid) {
  showPage('fiches');
  showFiche(cid);
}
loadProgress();
showPage('dashboard');
</script></body></html>
